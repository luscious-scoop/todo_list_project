<!doctype html>
<html lang="en">
	<head>
		<link
			rel="shortcut icon"
			href="./icons/pencil.png"
			type="image/x-icon"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
			rel="stylesheet"
		/>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>To Do App</title>
	</head>
	<body>
		<header>
			<h2 class="lato-bold-italic">To Do App</h2>
			<div class="header-btns">
				<button class="show-todo-form-btn">Add ToDo</button>
				<button class="notes-show-form-btn">Add Note</button>
			</div>
		</header>
		<nav class="sidebar">
			<div class="tasks-section">
				<button class="home tab-switch-btn active" data-id="home">
					Home
				</button>

				<button class="notes-selection-btn tab-switch-btn">
					Notes
				</button>
			</div>

			<div class="projects-section">
				<div class="header-section">
					<h2>Projects</h2>
					<button class="open-form-btn">
						<img src="./icons/plus.png" alt="" />
					</button>
				</div>
				<div class="projects"></div>
			</div>
		</nav>

		<main>
			<div class="todo-container"></div>
			<div class="notes-container"></div>
		</main>
		<dialog class="main-dialog">
			<div>
				<h2 class="task-form-heading"></h2>
				<button class="main-dialog-close-btn">
					<img src="./icons/close.png" alt="" />
				</button>
			</div>
		</dialog>
	</body>
</html>
